# ===========================================
# L'HAMZA F SEL'A - Docker Compose
# ===========================================

version: '3.8'

services:
  # Main API Server
  api:
    build: .
    container_name: lhamza-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - API_PORT=3000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - API_KEY=${API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - RATE_LIMIT=${RATE_LIMIT:-100}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Scraper service (runs periodically)
  scraper:
    build: .
    container_name: lhamza-scraper
    command: node scripts/run-universal.js
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - SCAN_CATEGORY=${SCAN_CATEGORY:-all}
      - SEND_ALERTS=true
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - scraper
    # Run manually with: docker-compose --profile scraper up scraper

  # Scheduled scraper (cron-based)
  scheduler:
    build: .
    container_name: lhamza-scheduler
    command: node scripts/price-monitor-cron.js
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 */4 * * *}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - scheduler
    restart: unless-stopped

volumes:
  data:
  logs:

networks:
  default:
    name: lhamza-network
