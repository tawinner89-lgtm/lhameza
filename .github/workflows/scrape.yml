# ===========================================
# L'HAMZA F SEL'A - Automated Scraper
# Runs every 6 hours to keep deals fresh
# ===========================================

name: "L'Hamza Scraper"

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      adapters:
        description: 'Adapters to run (comma-separated, or "all")'
        required: false
        default: 'all'
      category:
        description: 'Category to scrape (all/tech/fashion/home/beauty)'
        required: false
        default: 'all'

jobs:
  scrape:
    name: "Scrape Deals"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NODE_ENV: production
          CI: true
        run: |
          ADAPTERS="${{ github.event.inputs.adapters || 'all' }}"
          CATEGORY="${{ github.event.inputs.category || 'all' }}"
          
          if [ "$ADAPTERS" = "all" ] && [ "$CATEGORY" = "all" ]; then
            echo "Running ALL adapters in parallel..."
            node scripts/ci-scrape.js
          elif [ "$CATEGORY" != "all" ]; then
            echo "Running category: $CATEGORY"
            node scripts/ci-scrape.js --category "$CATEGORY"
          else
            echo "Running specific adapters: $ADAPTERS"
            node scripts/ci-scrape.js --adapters "$ADAPTERS"
          fi

      - name: Cleanup no-discount deals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/cleanup-no-discount.js || true

      - name: Summary
        if: always()
        run: echo "Scraping completed at $(date -u '+%Y-%m-%d %H:%M UTC')"

  # Cleanup old deals (weekly)
  cleanup:
    name: "Weekly Cleanup"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 0' || github.event_name == 'workflow_dispatch'
    needs: scrape
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cleanup old deals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node scripts/cleanup-no-discount.js || true
          node scripts/cleanup-duplicates.js || true
          echo "Cleanup done"
